<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <title>Cruza2 Roleplay | Formulario de Staff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-grid"></div>
  <div class="glow glow-one"></div>
  <div class="glow glow-two"></div>

  <main class="app-shell">
    <aside class="brand-panel">
      <div>
        <span class="eyebrow">POSTULACIÓN OFICIAL</span>
        <img class="server-logo" src="assets/cruza2_logo.png" alt="Cruza2 Roleplay">
        <p class="brand-copy">
          Evaluación de conocimientos, criterio administrativo y resolución de situaciones de roleplay.
        </p>
      </div>

      <div class="mascot-wrap">
        <div class="mascot-glow"></div>
        <img src="assets/dragon_icon.png" alt="Icono de Cruza2 Roleplay" class="mascot">
      </div>

      <div class="brand-footer">
        <span class="status-dot"></span>
        <span>Formulario web independiente</span>
      </div>
    </aside>

    <section class="form-panel">
      <header class="topbar">
        <div>
          <p class="section-kicker" id="sectionKicker">IDENTIFICACIÓN</p>
          <h1 id="sectionTitle">Formulario para Staff</h1>
        </div>

        <a class="admin-link" href="login.html" title="Abrir acceso administrativo">
          Acceso administrativo
        </a>
      </header>

      <div class="progress-area">
        <div class="progress-labels">
          <span id="progressLabel">Inicio</span>
          <strong id="progressValue">0%</strong>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <section class="content" id="content"></section>

      <footer class="actions">
        <button class="btn btn-secondary" type="button" id="backBtn">Atrás</button>
        <div class="action-spacer"></div>
        <span class="validation-text" id="validationText">Completa la información</span>
        <button class="btn btn-primary" type="button" id="nextBtn">
          <span id="nextBtnText">Comenzar</span>
          <span aria-hidden="true">→</span>
        </button>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
