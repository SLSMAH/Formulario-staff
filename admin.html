<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <title>Cruza2 Roleplay | Solicitudes de Staff</title>
  <link rel="stylesheet" href="admin.css">
  <script>
    (() => {
      const authenticated = sessionStorage.getItem("cruza2_admin_auth") === "true";
      const authenticatedAt = Number(sessionStorage.getItem("cruza2_admin_auth_time") || 0);
      const sessionValid = authenticated && Date.now() - authenticatedAt < 2 * 60 * 60 * 1000;

      if (!sessionValid) {
        sessionStorage.removeItem("cruza2_admin_auth");
        sessionStorage.removeItem("cruza2_admin_auth_time");
        window.location.replace("login.html");
      }
    })();
  </script>
</head>
<body>
  <div class="page-glow"></div>

  <main class="dashboard">
    <header class="dashboard-header">
      <div class="brand">
        <img src="assets/dragon_icon.png" alt="Cruza2">
        <div>
          <span>CRUZA2 ROLEPLAY</span>
          <h1>Solicitudes de Staff</h1>
        </div>
      </div>

      <div class="header-actions">
        <a class="button ghost" href="index.html">Volver al formulario</a>
        <button class="button ghost" id="exportBtn" type="button">Exportar JSON</button>
        <button class="button danger" id="clearBtn" type="button">Vaciar base local</button>
        <button class="button logout" id="logoutBtn" type="button">Cerrar sesión</button>
      </div>
    </header>

    <section class="stats">
      <article class="stat-card">
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </article>
      <article class="stat-card">
        <span>Pendientes</span>
        <strong id="pendingCount">0</strong>
      </article>
      <article class="stat-card">
        <span>Promedio automático</span>
        <strong id="averageScore">0%</strong>
      </article>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Buscar por Discord...">
      <select id="statusFilter">
        <option value="all">Todos los estados</option>
        <option value="Pendiente">Pendiente</option>
        <option value="Aceptado">Aceptado</option>
        <option value="Rechazado">Rechazado</option>
      </select>
    </section>

    <section id="applicationsList" class="applications-list"></section>
  </main>

  <dialog id="detailDialog">
    <div class="dialog-card">
      <header class="dialog-header">
        <div>
          <span>DETALLE DE SOLICITUD</span>
          <h2 id="dialogTitle">Postulación</h2>
        </div>
        <button id="closeDialogBtn" type="button" aria-label="Cerrar">×</button>
      </header>

      <div class="dialog-meta" id="dialogMeta"></div>
      <div class="answers" id="dialogAnswers"></div>

      <footer class="dialog-footer">
        <button class="button accepted" id="acceptBtn" type="button">Aceptar</button>
        <button class="button rejected" id="rejectBtn" type="button">Rechazar</button>
        <button class="button danger" id="deleteBtn" type="button">Eliminar</button>
      </footer>
    </div>
  </dialog>

  <script src="admin.js"></script>
</body>
</html>
