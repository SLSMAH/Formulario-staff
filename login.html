<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <title>Cruza2 Roleplay | Inicio de sesión</title>
  <link rel="icon" href="assets/dragon_icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-grid"></div>
  <div class="ambient ambient-one"></div>

  <main class="login-shell">
    <section class="login-brand">
      <span class="eyebrow">ACCESO PROTEGIDO</span>
      <video src="assets/cruza2_logo_360.mp4" autoplay loop muted playsinline></video>
      <img src="assets/dragon_icon.png" alt="Cruza2 Roleplay">
    </section>

    <section class="login-card">
      <span class="role-chip" id="roleChip">Panel</span>
      <h1 id="loginTitle">Iniciar sesión</h1>
      <p id="loginDescription">Introduce las credenciales autorizadas.</p>

      <form id="loginForm">
        <label>Usuario
          <input id="username" type="text" autocomplete="username" required maxlength="80">
        </label>
        <label>Contraseña
          <div class="password-wrap">
            <input id="password" type="password" autocomplete="current-password" required maxlength="120">
            <button id="togglePassword" type="button">Ver</button>
          </div>
        </label>
        <p id="loginMessage" class="login-message"></p>
        <button id="loginButton" class="button primary full" type="submit">Entrar al panel →</button>
      </form>

      <a class="back-link" href="access.html">← Elegir otro panel</a>
    </section>
  </main>

  <script src="config.js?v=20260724-2"></script>
  <script src="login.js"></script>
</body>
</html>
