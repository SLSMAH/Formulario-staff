<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <title>Cruza2 Roleplay | Acceso administrativo</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="grid"></div>
  <div class="login-glow"></div>

  <main class="login-shell">
    <section class="visual-panel">
      <span class="eyebrow">PANEL PRIVADO</span>
      <img class="server-logo" src="assets/cruza2_logo.png" alt="Cruza2 Roleplay">
      <div class="dragon-wrap">
        <div class="dragon-glow"></div>
        <img src="assets/dragon_icon.png" alt="Icono Cruza2" class="dragon">
      </div>
      <p>Acceso exclusivo para revisar, aceptar, rechazar y exportar las solicitudes de staff.</p>
    </section>

    <section class="login-panel">
      <div class="login-header">
        <span>SEGURIDAD ADMINISTRATIVA</span>
        <h1>Iniciar sesión</h1>
        <p>Introduce las credenciales autorizadas para continuar.</p>
      </div>

      <form id="loginForm" novalidate>
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <input id="username" name="username" type="text" autocomplete="username" maxlength="40" placeholder="Usuario administrativo">
        </div>

        <label for="password">Contraseña</label>
        <div class="input-wrap password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" maxlength="80" placeholder="Contraseña">
          <button id="togglePassword" type="button" aria-label="Mostrar u ocultar contraseña">Ver</button>
        </div>

        <p class="login-error" id="loginError" aria-live="polite"></p>

        <button class="login-button" id="loginButton" type="submit">
          <span>Entrar al panel</span>
          <span aria-hidden="true">→</span>
        </button>
      </form>

      <a class="back-link" href="index.html">← Volver al formulario</a>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
